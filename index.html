<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a2a66; /* deep blue */
    color: white;
  }

  header {
  text-align: center;
  padding: 10px;
  background: #061a40;
  color: #ffd600; /* makes text yellow */
  }

  .teamA-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .teamA-header img {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
  }

  input {
    width: 45%;
    padding: 8px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    text-align: center;
    font-size: 16px;
  }

  .timer {
    font-size: 24px;
    margin: 5px 0;
  }

  .controls button {
    margin: 3px;
    padding: 6px 10px;
    border-radius: 8px;
    border: none;
    background: #ffcc00; color: black;
    color: black;
  }

  .half {
    font-size: 14px;
    opacity: 0.9;
  }

  .container {
    padding: 10px;
  }

  .team {
    background:#0047cc; /* brighter pitch-side blue */
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    border: 2px solid #ffcc00;
  }

  .score {
    text-align: center;
    font-size: 22px;
    margin-bottom: 10px;
  }

  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  button {
    padding: 14px;
    font-size: 14px;
    border-radius: 10px;
    border: none;
  }

  /* Action buttons */
  .goal { background: #ff5252; color: white; }
  .point { background: #ffcc00; color: black; }
  .wide { background: #b0bec5; }
  .free { background: #64b5f6; }
  .fortyfive { background: #9575cd; }

  .undo {
    background: #ffb300;
    color: black;
    width: 100%;
    margin-top: 10px;
  }

  .reset {
    background: #263238;
    color: white;
    width: 100%;
    margin-top: 5px;
  }

  #log {
    background: white;
    color: black;
    border-radius: 10px;
    padding: 10px;
    max-height: 160px;
    overflow-y: auto;
    font-size: 13px;
    margin-top: 10px;
  }
</style>
</head>

<body>

<header>
  <link rel="icon" type="image/png" href="icon2.jpg">
  <div class="teamA-header">
    <img id="teamALogo" src="icon.png" alt="Tullylish">
  </div>
  <input id="teamAName" placeholder="Tullylish">
  <input id="teamBName" placeholder="Team B">

  <div class="timer" id="timer">00:00</div>
  <div class="half" id="half">First Half</div>

  <div class="controls">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
    <button onclick="toggleHalf()">Half-Time</button>
  </div>
</header>

<div class="container">

  <div class="team">
    <div class="score" id="scoreA">0-0 (0)</div>
    <div class="buttons">
      <button class="goal" onclick="addScore('A','goal')">Goal</button>
      <button class="point" onclick="addScore('A','point')">Point</button>
      <button class="wide" onclick="addScore('A','wide')">Wide</button>
      <button class="free" onclick="addScore('A','free')">Free</button>
      <button class="fortyfive" onclick="addScore('A','45')">45</button>
    </div>
  </div>

  <div class="team">
    <div class="score" id="scoreB">0-0 (0)</div>
    <div class="buttons">
      <button class="goal" onclick="addScore('B','goal')">Goal</button>
      <button class="point" onclick="addScore('B','point')">Point</button>
      <button class="wide" onclick="addScore('B','wide')">Wide</button>
      <button class="free" onclick="addScore('B','free')">Free</button>
      <button class="fortyfive" onclick="addScore('B','45')">45</button>
    </div>
  </div>

  <button class="undo" onclick="undo()">Undo Last Action</button>
  <button class="reset" onclick="resetMatch()">Reset Match</button>

  <div id="log"></div>

</div>

<script> 
let score = { A:{goals:0,points:0}, B:{goals:0,points:0} }; 
let history = []; 

let seconds = 0; 
let interval = null; 
let half = 1; 
const HALF_TIME = 2100; 

// TEAM NAME (hard-wired A) 
function getTeamName(team) { 
  if (team === 'A') return "Tullylish"; 
  const el = document.getElementById("teamBName"); 
  return el ? el.value || "Team B" : "Team B"; 
} 

// TIMER 
function updateTimer() { 
  const timerEl = document.getElementById("timer"); 
  if (!timerEl) return; 

  let mins = String(Math.floor(seconds / 60)).padStart(2,'0'); 
  let secs = String(seconds % 60).padStart(2,'0'); 
  timerEl.innerText = `${mins}:${secs}`; 

  if (seconds === HALF_TIME && half === 1) { 
    toggleHalf(true); 
  } 
} 

function startTimer() { 
  if (!interval) { 
    interval = setInterval(() => { 
      seconds++; 
      updateTimer(); 
    }, 1000); 
  } 
} 

function pauseTimer() { 
  clearInterval(interval); 
  interval = null; 
} 

function resetTimer() { 
  pauseTimer(); 
  seconds = 0; 
  half = 1; 
  const halfEl = document.getElementById("half"); 
  if (halfEl) halfEl.innerText = "First Half"; 
  updateTimer(); 
} 

function toggleHalf(auto=false) { 
  half = half === 1 ? 2 : 1; 
  const halfEl = document.getElementById("half"); 
  if (halfEl) { 
    halfEl.innerText = half === 1 ? "First Half" : "Second Half"; 
  } 
  logEvent(auto ? "Half-time reached" : "Half switched"); 
} 

// SCORE (safe) 
function addScore(team, type) { 
  if (!score[team]) return; 

  history.push(JSON.parse(JSON.stringify(score))); 

  if (type === 'goal') score[team].goals++; 
  if (type === 'point') score[team].points++; 

  updateDisplay(); 
  logEvent(`${getTeamName(team)} ${type}`); 
} 

// DISPLAY (safe) 
function updateDisplay() { 
  const aEl = document.getElementById("scoreA"); 
  const bEl = document.getElementById("scoreB"); 

  if (!aEl || !bEl) return; 

  let aTotal = score.A.goals*3 + score.A.points; 
  let bTotal = score.B.goals*3 + score.B.points; 

  aEl.innerText = `${score.A.goals}-${score.A.points} (${aTotal})`; 
  bEl.innerText = `${score.B.goals}-${score.B.points} (${bTotal})`; 
} 

// UNDO 
function undo() { 
  if (history.length > 0) { 
    score = history.pop(); 
    updateDisplay(); 
    logEvent("Undo"); 
  } 
} 

// LOG (safe) 
function logEvent(text) { 
  const log = document.getElementById("log"); 
  const timer = document.getElementById("timer"); 

  if (!log || !timer) return; 

  let period = half === 1 ? "1H" : "2H"; 
  log.innerHTML = `<div>[${timer.innerText} ${period}] ${text}</div>` + log.innerHTML; 
} 

// RESET 
function resetMatch() { 
  score = { A:{goals:0,points:0}, B:{goals:0,points:0} }; 
  history = []; 
  seconds = 0; 
  half = 1; 

  const log = document.getElementById("log"); 
  if (log) log.innerHTML = ""; 

  updateDisplay(); 
  updateTimer(); 
} 

// INIT 
updateDisplay(); 
updateTimer(); 
</script> 


</body>
</html>
