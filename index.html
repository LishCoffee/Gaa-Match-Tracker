<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<meta name="theme-color" content="#002a80">
<meta name="mobile-web-app-capable" content="yes">
  
<title>GAA Match Tracker</title> 
  
<link rel="manifest" href="manifest.json">
  
<style> 

  html, body {
  overscroll-behaviour: none;
  height: 100%
  overflow: hidden;
  }
  
  body { 
    margin: 0; 
    font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
    background: #0033a0; 
    color: white; 
  } 

  .scoreboard { 
    background: #002a80; 
    padding: 10px; 
    text-align: center; 
    border-bottom: 3px solid #ffcc00; 
  } 

  .row { margin: 4px 0; } 

  .score { 
    font-size: 28px; 
    font-weight: bold; 
  } 

  .team-title {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 22px;
  font-weight: 800;
  margin: 10px 0;
}

.team-logo-inline {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  object-fit: cover;
}

  .meta { 
    font-size: 13px; 
    color: #ffcc00; 
  } 

  header { 
    text-align: center; 
    padding: 10px; 
    background: #001f5c; 
  } 

  input { 
    width: 45%; 
    padding: 8px; 
    margin: 5px; 
    border-radius: 8px; 
    border: none; 
    text-align: center; 
    font-size: 16px; 
  } 

  .container { 
    padding: 10px;
    height: calc(100vh - 140px); /*adjust if needed */
    overflow-y: auto;  
  } 

  .team { 
    background: #0050d4; 
    border-radius: 15px;
    padding: 15px; 
    margin-bottom: 10px; 
  } 

  .buttons { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 8px; 
  } 

  button { 
    padding: 14px; 
    font-size: 14px; 
    border-radius: 10px; 
    border: none; 
    font-weight: bold; 
  } 

  .goal { background: #ff5252; color: white; } 
  .point { background: #ffcc00; color: black; } 
  .two { background: #00e676; color: black; } 
  .wide { background: #b0bec5; } 
  .free { background: #64b5f6; } 
  .fortyfive { background: #9575cd; } 

  .undo { 
    background: orange; 
    width: 100%; 
    margin-top: 10px; 
  } 

  .reset { 
    background: #263238; 
    color: white; 
    width: 100%; 
    margin-top: 5px; 
  } 

  .popup { 
  position: fixed; 
  top: 0; 
  left: 0; 
  width: 100%; 
  height: 100%; 
  background: rgba(0,0,0,0.7); 
  display: none; 
  justify-content: center; 
  align-items: center; 
} 

.popup-content { 
  background: #0033a0; /* Tullylish Blue" */ 
  color: white; 
  padding: 20px; 
  border-radius: 14px; 
  width: 85%; 
  max-width: 320px; 
  text-align: center;
  border: 3px solid #ffcc00; /* yellow */
} 

.popup-content h2 { 
  margin-top: 0; 
  color: #ffcc00;
} 

.popup-content button { 
  margin-top: 10px; 
  padding: 10px;   
  border: none; 
  border-radius: 8px; 
  font-weight: bold;
} 

.close-btn {
  background: #263238;
  color: white;
}

.share-btn {
  background: #25D366; /* WhatsApp green */;
  color: white;
}

  #log { 
    background: white; 
    color: black; 
    border-radius: 10px; 
    padding: 10px; 
    max-height: 160px; 
    overflow-y: auto; 
    font-size: 13px; 
    margin-top: 10px; 
  } 
</style> 
</head> 

<body> 

<!-- SCOREBOARD --> 
<div class="scoreboard"> 
  <div class="row"> 
    <strong> Tullylish</strong> vs <strong><span id="teamBNameDisplay">Team B</span></strong> 
  </div> 

  <div class="row score"> 
    <span id="scoreA">0-0 (0)</span> - 
    <span id="scoreB">0-0 (0)</span> 
  </div> 

  <div class="row meta"> 
    <span id="timer">00:00</span> | 
    <span id="halfDisplay">1H</span> 
  </div> 
</div> 

<header> 
  <input id="teamBName" placeholder="Team B" oninput="updateDisplay()"> 

  <div> 
    <button onclick="startTimer()">Start</button> 
    <button onclick="pauseTimer()">Stop</button> 
    <button onclick="resetTimer()">Reset</button> 
    <button onclick="toggleHalf()">Half Time/Full Time</button> 
  </div> 
</header> 

<div class="container"> 

  <div class="team"> 
    <h3 class="team-title">
  <img src="icon.png" class="team-logo-inline">
  Tullylish
</h3>
    <div class="buttons"> 
      <button class="goal" onclick="addScore('A','goal')">Goal</button> 
      <button class="point" onclick="addScore('A','point')">Point</button> 
      <button class="two" onclick="addScore('A','two')">2 Pointer</button> 
      <button class="wide" onclick="addScore('A','wide')">Wide</button> 
      <button class="free" onclick="addScore('A','free')">Free</button> 
      <button class="fortyfive" onclick="addScore('A','45')">45</button> 
    </div> 
  </div> 

  <div class="team"> 
   <h3 id="teamBTitle" class="team-title">Team B</h3>
    <div class="buttons"> 
      <button class="goal" onclick="addScore('B','goal')">Goal</button> 
      <button class="point" onclick="addScore('B','point')">Point</button> 
      <button class="two" onclick="addScore('B','two')">2 Pointer</button> 
      <button class="wide" onclick="addScore('B','wide')">Wide</button> 
      <button class="free" onclick="addScore('B','free')">Free</button> 
      <button class="fortyfive" onclick="addScore('B','45')">45</button> 
    </div> 
  </div> 

  <button class="undo" onclick="undo()">Undo</button> 
  <button class="reset" onclick="resetMatch()">Reset</button> 

  <div id="log"></div> 
</div> 

<script> 

//UpdateTeamBName
function updateTeamB() {
  updateDisplay();

  //also update team title inside buttons
  section
  const title = document.getElementById("teamBTitle");
    if (title) title.innerText = getTeamB();
}

//Report
function generateReport(type) { 

  const aPoints = score.A.points + (score.A.twos * 2); 
  const bPoints = score.B.points + (score.B.twos * 2); 

  const aTotal = (score.A.goals * 3) + aPoints; 
  const bTotal = (score.B.goals * 3) + bPoints; 

  const report = 
`${type} REPORT 

Tullylish ${score.A.goals}-${aPoints} (${aTotal}) | 2P: ${score.A.twos} 
${getTeamB()} ${score.B.goals}-${bPoints} (${bTotal}) | 2P: ${score.B.twos}`; 

  lastReportText = report; 

  document.getElementById("reportTitle").innerText = type + " REPORT"; 
  document.getElementById("reportText").innerText = report; 

  document.getElementById("reportPopup").style.display = "flex"; 
} 

function shareReport() { 

  if (!lastReportText) return; 

  const encoded = encodeURIComponent(lastReportText); 

const url = `https://wa.me/?text=${encoded}`; 

  window.open(url, "_blank"); 
} 

function closePopup() { 
  document.getElementById("reportPopup").style.display = "none"; 
} 

let score = { 
  A:{goals:0,points:0,twos:0}, 
  B:{goals:0,points:0,twos:0} 
}; 

let history = []; 
let seconds = 0; 
let interval = null; 
let half = 1; 

// TIMER 
function startTimer() { 
  if (!interval) { 
    interval = setInterval(() => { 
      seconds++; 
      updateTimer(); 
    }, 1000); 
  } 
} 

function pauseTimer() { 
  clearInterval(interval); 
  interval = null; 
} 

function resetTimer() { 
  pauseTimer(); 
  seconds = 0; 
  updateTimer(); 
} 

function updateTimer() { 
  let m = String(Math.floor(seconds/60)).padStart(2,'0'); 
  let s = String(seconds%60).padStart(2,'0'); 
  document.getElementById("timer").innerText = `${m}:${s}`; 
} 

// TOTAL CALC 
function getTotal(team) { 
  return (score[team].goals * 3) + 
         score[team].points + 
         (score[team].twos * 2); 
} 

// DISPLAY 
function updateDisplay() { 

  let aPoints = score.A.points + (score.A.twos * 2); 
  let bPoints = score.B.points + (score.B.twos * 2); 

  let aTotal = (score.A.goals * 3) + aPoints; 
  let bTotal = (score.B.goals * 3) + bPoints; 

  let aTwos = score.A.twos > 0 ? ` (2P:${score.A.twos})` : ""; 
  let bTwos = score.B.twos > 0 ? ` (2P:${score.B.twos})` : ""; 

  document.getElementById("scoreA").innerText = 
    `${score.A.goals}-${aPoints} (${aTotal})${aTwos}`; 

  document.getElementById("scoreB").innerText = 
    `${score.B.goals}-${bPoints} (${bTotal})${bTwos}`; 

  document.getElementById("halfDisplay").innerText = 
    half === 1 ? "1H" : "2H"; 

  document.getElementById("teamBNameDisplay").innerText = 
    getTeamB(); 

  document.getElementById("teamBTitle").innerText = getTeamB();

const scoreAEl = document.getElementById("scoreA"); 
const scoreBEl = document.getElementById("scoreB"); 

// reset first 
scoreAEl.style.color = "white"; 
scoreBEl.style.color = "white"; 

const board = document.querySelector(".scoreboard"); 

if (aTotal > bTotal) { 
  board.style.background = "#004d00"; // green tint 
} else if (bTotal > aTotal) { 
  board.style.background = "#660000"; // red tint 
} else { 
  board.style.background = "#002a80"; // default 
} 

} 


// SCORE 
function addScore(team, type) { 
  history.push(JSON.parse(JSON.stringify(score))); 

  if (type === 'goal') score[team].goals++; 
  if (type === 'point') score[team].points++; 
  if (type === 'two') score[team].twos++; 

  updateDisplay(); 

  const name = team === 'A' ? "Tullylish" : getTeamB(); 
  logEvent(`${name} ${type === 'two' ? '2 Pointer' : type}`); 
} 

// HALF / FULL TIME 
function toggleHalf() { 

  if (half === 1) { 

    logEvent( 
      `HALF TIME: Tullylish ${formatScore(score.A)} - ${getTeamB()} ${formatScore(score.B)}` 
    ); 

    generateReport("HALF TIME"); // popup 
    half = 2; 

  } else { 

    logEvent( 
      `FULL TIME: Tullylish ${formatScore(score.A)} - ${getTeamB()} ${formatScore(score.B)}` 
    ); 

    generateReport("FULL TIME"); // popup 
    half = 1; 
  } 

  updateDisplay(); 
} 

// FORMAT SCORE FOR LOG 
function formatScore(t) { 
  let points = t.points + (t.twos * 2); 
  let total = (t.goals * 3) + points; 

  let twosText = t.twos > 0 ? ` (${t.twos})` : ""; 

  return `${t.goals}-${points} (${total})${twosText}`; 
} 

function getTotalScore(t) { 
  return (t.goals * 3) + t.points + (t.twos * 2); 
} 

// TEAM B 
function getTeamB() { 
  return document.getElementById("teamBName").value || "Team B"; 
} 

// UNDO 
function undo() { 
  if (history.length > 0) { 
    score = history.pop(); 
    updateDisplay(); 
  } 
} 

// LOG 
function logEvent(text) { 
  const log = document.getElementById("log"); 

  const time = document.getElementById("timer").innerText; 
  const period = half === 1 ? "1H" : "2H"; 

  const div = document.createElement("div"); 
  div.textContent = `[${time} ${period}] ${text}`; 

  log.prepend(div); 
} 

// RESET 
function resetMatch() { 
  score = { 
    A:{goals:0,points:0,twos:0}, 
    B:{goals:0,points:0,twos:0} 
  }; 

  history = []; 
  seconds = 0; 
  half = 1; 

  document.getElementById("log").innerHTML = ""; 

  updateDisplay(); 
  updateTimer(); 
} 

updateDisplay(); 
updateTimer(); 

let startY = 0; 

document.addEventListener("touchstart", function(e) { 
  startY = e.touches[0].clientY; 
}, { passive: true }); 

document.addEventListener("touchmove", function(e) { 
  let currentY = e.touches[0].clientY; 

  if (window.scrollY === 0 && currentY > startY) { 
    e.preventDefault(); // 🚫 blocks pull refresh 
  } 
}, { passive: false }); 

</script> 

<div id="reportPopup" class="popup"> 
  <div class="popup-content"> 
    <h2 id="reportTitle"></h2> 
    <pre id="reportText"></pre> 

    <button class="share-btn" onclick="shareReport()">Share to WhatsApp</button> 
    <button class="close-btn" onclick="closePopup()">Close</button> 
  </div> 
</div> 

</body> 
</html>
