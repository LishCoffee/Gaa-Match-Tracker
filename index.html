<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0b3d2e;
    color: white;
  }

  header {
    text-align: center;
    padding: 10px;
    background: #06251c;
  }

  input {
    width: 45%;
    padding: 8px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    text-align: center;
    font-size: 16px;
  }

  .timer {
    font-size: 24px;
    margin: 5px 0;
  }

  .controls button {
    margin: 3px;
    padding: 6px 10px;
    border-radius: 8px;
    border: none;
  }

  .half {
    margin-top: 5px;
    font-size: 14px;
    opacity: 0.9;
  }

  .container {
    padding: 10px;
  }

  .team {
    background: #145c43;
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 10px;
  }

  .score {
    text-align: center;
    font-size: 22px;
    margin-bottom: 10px;
  }

  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  button {
    padding: 14px;
    font-size: 14px;
    border-radius: 10px;
    border: none;
  }

  .goal { background: #ff5252; color: white; }
  .point { background: #ffd166; color: black; }
  .wide { background: #9e9e9e; }
  .free { background: #4dabf7; }
  .fortyfive { background: #b197fc; }

  .undo { background: orange; width: 100%; margin-top: 10px; }
  .reset { background: #333; color: white; width: 100%; margin-top: 5px; }

  #log {
    background: white;
    color: black;
    border-radius: 10px;
    padding: 10px;
    max-height: 160px;
    overflow-y: auto;
    font-size: 13px;
    margin-top: 10px;
  }
</style>
</head>

<body>

<header>
  <div class="teamA-header">
    <img id="teamALogo" src="icon.png" alt="Tullylish">
  </div>
  <input id="teamAName" placeholder="Tullylish">
  <input id="teamBName" placeholder="Team B">

  <div class="timer" id="timer">00:00</div>
  <div class="half" id="half">First Half</div>

  <div class="controls">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
    <button onclick="toggleHalf()">Half-Time</button>
  </div>
</header>

<div class="container">

  <div class="team">
    <div class="score" id="scoreA">0-0 (0)</div>
    <div class="buttons">
      <button class="goal" onclick="addScore('A','goal')">Goal</button>
      <button class="point" onclick="addScore('A','point')">Point</button>
      <button class="wide" onclick="addScore('A','wide')">Wide</button>
      <button class="free" onclick="addScore('A','free')">Free</button>
      <button class="fortyfive" onclick="addScore('A','45')">45</button>
    </div>
  </div>

  <div class="team">
    <div class="score" id="scoreB">0-0 (0)</div>
    <div class="buttons">
      <button class="goal" onclick="addScore('B','goal')">Goal</button>
      <button class="point" onclick="addScore('B','point')">Point</button>
      <button class="wide" onclick="addScore('B','wide')">Wide</button>
      <button class="free" onclick="addScore('B','free')">Free</button>
      <button class="fortyfive" onclick="addScore('B','45')">45</button>
    </div>
  </div>

  <button class="undo" onclick="undo()">Undo Last Action</button>
  <button class="reset" onclick="resetMatch()">Reset Match</button>

  <div id="log"></div>

</div>

<script>
let score = { A:{goals:0,points:0}, B:{goals:0,points:0} };
let history = [];

let seconds = 0;
let interval = null;
let half = 1;
const HALF_TIME = 2100; // 35 minutes

function updateTimer() {
  let mins = String(Math.floor(seconds / 60)).padStart(2,'0');
  let secs = String(seconds % 60).padStart(2,'0');
  document.getElementById("timer").innerText = `${mins}:${secs}`;

  if (seconds >= HALF_TIME && half === 1) {
    toggleHalf(true);
  }
}

function startTimer() {
  if (!interval) {
    interval = setInterval(() => {
      seconds++;
      updateTimer();
      save();
    }, 1000);
  }
}

function pauseTimer() {
  clearInterval(interval);
  interval = null;
}

function resetTimer() {
  pauseTimer();
  seconds = 0;
  half = 1;
  document.getElementById("half").innerText = "First Half";
  updateTimer();
  save();
}

function toggleHalf(auto = false) {
  half = half === 1 ? 2 : 1;
  document.getElementById("half").innerText =
    half === 1 ? "First Half" : "Second Half";

  logEvent(auto ? "Half-time reached" : "Half switched");
}

function addScore(team, type) {
  history.push(JSON.parse(JSON.stringify(score)));

  if (type === 'goal') score[team].goals++;
  else if (type === 'point') score[team].points++;

  logEvent(`${getTeamName(team)} ${type}`);
  updateDisplay();
  save();
}

function updateDisplay() {
  let aTotal = score.A.goals*3 + score.A.points;
  let bTotal = score.B.goals*3 + score.B.points;

  document.getElementById("scoreA").innerText =
    `${score.A.goals}-${score.A.points} (${aTotal})`;

  document.getElementById("scoreB").innerText =
    `${score.B.goals}-${score.B.points} (${bTotal})`;
}

function undo() {
  if (history.length > 0) {
    score = history.pop();
    updateDisplay();
    logEvent("Undo");
    save();
  }
}

function logEvent(text) {
  let log = document.getElementById("log");
  let time = document.getElementById("timer").innerText;
  let period = half === 1 ? "1H" : "2H";
  log.innerHTML = `<div>[${time} ${period}] ${text}</div>` + log.innerHTML;
}

function getTeamName(team) {
  return document.getElementById(team === 'A' ? "teamAName" : "teamBName").value || `Team ${team}`;
}

function resetMatch() {
  score = { A:{goals:0,points:0}, B:{goals:0,points:0} };
  history = [];
  seconds = 0;
  half = 1;
  document.getElementById("log").innerHTML = "";
  document.getElementById("half").innerText = "First Half";
  updateDisplay();
  updateTimer();
  save();
}

// SAVE / LOAD
function save() {
  localStorage.setItem("gaaApp", JSON.stringify({
    score,
    history,
    seconds,
    half,
    teamA: document.getElementById("teamAName").value,
    teamB: document.getElementById("teamBName").value
  }));
}

  function load() {
  let data = JSON.parse(localStorage.getItem("gaaApp"));
  if (data) {
    score = data.score;
    history = data.history || [];
    seconds = data.seconds || 0;
    half = data.half || 1;

    document.getElementById("teamAName").value = data.teamA || "";
    document.getElementById("teamBName").value = data.teamB || "";

    document.getElementById("half").innerText =
      half === 1 ? "First Half" : "Second Half";

    updateDisplay();
    updateTimer();
  }

}

load();
</script>

</body>
</html>
