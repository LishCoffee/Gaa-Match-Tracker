<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>GAA Match Tracker</title> 

<style> 
body { 
  margin: 0; 
  font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
  background: #0033a0; 
  color: white; 
} 

/* SCOREBOARD */ 
.scoreboard { 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  background: #002a80; 
  padding: 12px; 
  border-bottom: 3px solid #ffcc00; 
  font-weight: bold; 
} 

.team-side { 
  display: flex; 
  align-items: center; 
  gap: 6px; 
} 

.logo { 
  width: 26px; 
  height: 26px; 
  border-radius: 50%; 
} 

.score-middle { 
  font-size: 26px; 
} 

#timer { 
  font-size: 14px; 
  color: #ffcc00; 
  margin: 0 8px; 
} 

/* HEADER */ 
header { 
  text-align: center; 
  padding: 10px; 
  background: #001f5c; 
} 

input { 
  width: 60%; 
  padding: 8px; 
  margin: 5px; 
  border-radius: 8px; 
  border: none; 
  text-align: center; 
} 

/* BUTTONS */ 
.container { 
  padding: 10px; 
} 

.team { 
  background: #0050d4; 
  border-radius: 15px; 
  padding: 15px; 
  margin-bottom: 10px; 
} 

.buttons { 
  display: grid; 
  grid-template-columns: 1fr 1fr; 
  gap: 8px; 
} 

button { 
  padding: 14px; 
  border-radius: 10px; 
  border: none; 
} 

.goal { background: #ff5252; color: white; } 
.point { background: #ffcc00; color: black; } 

.undo { background: orange; width: 100%; margin-top: 10px; } 
.reset { background: #333; color: white; width: 100%; margin-top: 5px; } 

/* LOG */ 
#log { 
  background: white; 
  color: black; 
  border-radius: 10px; 
  padding: 10px; 
  max-height: 160px; 
  overflow-y: auto; 
  margin-top: 10px; 
} 

#log div { 
  padding: 4px 0; 
  border-bottom: 1px solid #ddd; 
} 
</style> 
</head> 

<body> 

<!-- SCOREBOARD --> 
<div class="scoreboard"> 
  <div class="team-side"> 
    <img src="tullylish.png" class="logo"> 
    <span>Tullylish</span> 
  </div> 

  <div class="score-middle"> 
    <span id="scoreA">0-0</span> 
    <span id="timer">00:00</span> 
    - 
    <span id="scoreB">0-0</span> 
  </div> 

  <div class="team-side"> 
    <span id="teamBNameDisplay">Team B</span> 
  </div> 
</div> 

<header> 
  <input id="teamBName" placeholder="Team B"> 

  <div> 
    <button onclick="startTimer()">Start</button> 
    <button onclick="pauseTimer()">Pause</button> 
    <button onclick="resetTimer()">Reset</button> 
    <button onclick="toggleHalf()">2nd Half</button> 
  </div> 
</header> 

<div class="container"> 

  <div class="team"> 
    <h3>Tullylish</h3> 
    <div class="buttons"> 
      <button class="goal" onclick="addScore('A','goal')">Goal</button> 
      <button class="point" onclick="addScore('A','point')">Point</button> 
    </div> 
  </div> 

  <div class="team"> 
    <h3 id="teamBTitle">Team B</h3> 
    <div class="buttons"> 
      <button class="goal" onclick="addScore('B','goal')">Goal</button> 
      <button class="point" onclick="addScore('B','point')">Point</button> 
    </div> 
  </div> 

  <button class="undo" onclick="undo()">Undo</button> 
  <button class="reset" onclick="resetMatch()">Reset</button> 

  <div id="log"></div> 

</div> 

<script> 

let score = { A:{goals:0,points:0}, B:{goals:0,points:0} }; 
let history = []; 
let seconds = 0; 
let interval = null; 
let half = 1; 

/* TIMER */ 
function startTimer() { 
  if (!interval) { 
    interval = setInterval(() => { 
      seconds++; 
      updateTimer(); 
    }, 1000); 
  } 
} 

function pauseTimer() { 
  clearInterval(interval); 
  interval = null; 
} 

function resetTimer() { 
  pauseTimer(); 
  seconds = 0; 
  updateTimer(); 
} 

function updateTimer() { 
  let m = String(Math.floor(seconds/60)).padStart(2,'0'); 
  let s = String(seconds%60).padStart(2,'0'); 
  document.getElementById("timer").innerText = `${m}:${s}`; 
} 

/* HALF */ 
function toggleHalf() { 
  half = half === 1 ? 2 : 1; 
  logEvent(half === 1 ? "First Half" : "Second Half"); 
} 

/* SCORE */ 
function addScore(team, type) { 
  history.push(JSON.parse(JSON.stringify(score))); 

  if (type === 'goal') score[team].goals++; 
  if (type === 'point') score[team].points++; 

  updateDisplay(); 

  const name = team === 'A' ? "Tullylish" : getTeamB(); 
  logEvent(name + " " + type); 
} 

/* DISPLAY */ 
function updateDisplay() { 
  document.getElementById("scoreA").innerText = 
    `${score.A.goals}-${score.A.points}`; 

  document.getElementById("scoreB").innerText = 
    `${score.B.goals}-${score.B.points}`; 

  document.getElementById("teamBNameDisplay").innerText = 
    getTeamB(); 
} 

function getTeamB() { 
  return document.getElementById("teamBName").value || "Team B"; 
} 

/* UNDO */ 
function undo() { 
  if (history.length > 0) { 
    score = history.pop(); 
    updateDisplay(); 
    logEvent("Undo"); 
  } 
} 

/* LOG (bulletproof) */ 
function logEvent(text) { 
  const log = document.getElementById("log"); 
  if (!log) return; 

  let time = document.getElementById("timer").innerText; 
  let period = half === 1 ? "1H" : "2H"; 

  const entry = document.createElement("div"); 
  entry.textContent = `[${time} ${period}] ${text}`; 

  log.prepend(entry); 
} 

/* RESET */ 
function resetMatch() { 
  score = { A:{goals:0,points:0}, B:{goals:0,points:0} }; 
  history = []; 
  seconds = 0; 
  updateDisplay(); 
  updateTimer(); 
} 

/* INIT */ 
updateDisplay(); 
updateTimer(); 
logEvent("Match Ready"); 

</script> 

</body> 
</html>
