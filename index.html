<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>GAA Match Tracker</title> 

<style> 
  body { 
    margin: 0; 
    font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
    background: #0033a0; 
    color: white; 
  } 

  /* RTÉ SCOREBOARD */ 
.scoreboard { 
  background: #002a80; 
  padding: 10px; 
  text-align: center; 
  border-bottom: 3px solid #ffcc00; 
} 

/* each line */ 
.row { 
  margin: 4px 0; 
} 

/* TEAM NAMES */ 
.teams { 
  display: flex; 
  justify-content: space-between; 
  font-size: 13px; 
  font-weight: bold; 
} 

/* SCORE */ 
.score { 
  font-size: 32px; 
  font-weight: bold; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  gap: 10px; 
} 

/* TIMER */ 
.meta { 
  font-size: 13px; 
  color: #ffcc00; 
} 

/* LOGO */ 
.logo { 
  width: 20px; 
  height: 20px; 
  border-radius: 50%; 
  margin-right: 4px; 
} 

/* TEAM GROUP */ 
.team { 
  display: flex; 
  align-items: center; 
  gap: 5px; 
} 

.dash { 
  font-size: 22px; 
} 

.teams-line {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 4px;
}

.vs {
  margin: 0 6px;
  opacity: 0.7;
}

.score-line {
  font-size: 40px; /* 🔥 BIG score */
  font-weight: bold;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.match-info {
  font-size: 13px;
  color: #ffcc00;
}

  #timer { 
    font-size: 14px; 
    color: #ffcc00; 
    margin: 0 8px; 
  } 

  .dash { 
    margin: 0 6px; 
    color: #ffcc00; 
  } 

  header { 
    text-align: center; 
    padding: 10px; 
    background: #001f5c; 
  } 

  input { 
    width: 45%; 
    padding: 8px; 
    margin: 5px; 
    border-radius: 8px; 
    border: none; 
    text-a8lign: center; 
    font-size: 16px; 
  } 

  .container { 
    padding: 10px; 
  } 

  .team { 
    background: #0050d4; 
    border-radius: 15px; 
    padding: 15px; 
    margin-bottom: 10px; 
  } 

  .buttons { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 8px; 
  } 

  button { 
    padding: 16px; 
    font-size: 15px; 
    border-radius: 12px; 
    border: none;
    margin: 4px;
    font-weight: bold;
  } 

  button:last-child {
    backfround: #ffcc00;
    color: black;
    font-weight: bold;
  }

  .goal { background: #ff5252; color: white; } 
  .point { background: #ffcc00; color: black; } 
  .wide { background: #b0bec5; } 
  .free { background: #64b5f6; } 
  .fortyfive { background: #9575cd; } 

  .undo { 
    background: #ffb300; 
    color: black; 
    width: 100%; 
    margin-top: 10px; 
  } 

  .reset { 
    background: #263238; 
    color: white; 
    width: 100%; 
    margin-top: 5px; 
  } 

  #log { 
    background: white; 
    color: black; 
    border-radius: 10px; 
    padding: 10px; 
    max-height: 160px; 
    overflow-y: auto; 
    font-size: 13px; 
    margin-top: 10px; 
  } 

  .teamA-wrap { 
  display: flex; 
  align-items: center; 
  gap: 6px; 
} 

.team-logo { 
  width: 26px; 
  height: 26px; 
  border-radius: 50%; 
} 

</style> 
</head> 

<body> 

<!-- RTÉ SCOREBOARD --> 
<div class="scoreboard"> 

  <div class="row teams"> 
    <span class="team"> 
      <img src="icon.png" class="logo"> 
      Tullylish 
    </span> 

    <span class="team" id="teamBNameDisplay">Team B</span> 
  </div> 

  <div class="row score"> 
    <span id="scoreA">0-0 (0)</span> 
    <span class="dash">-</span> 
    <span id="scoreB">0-0 (0)</span> 
  </div> 

  <div class="row meta"> 
    <span id="timer">00:00</span> 
    <span id="halfDisplay">1H</span> 
  </div> 

</div> 

<header> 
  <input id="teamBName" placeholder="Team B"> 

  <div> 
    <button onclick="startTimer()">Start</button> 
    <button onclick="pauseTimer()">Pause</button> 
    <button onclick="resetTimer()">Reset</button>
    <button onclick="toggleHalf()">2nd Half</button>
  </div> 
</header> 

<div class="container"> 

  <div class="team"> 
    <h3>Tullylish</h3> 
    <div class="buttons"> 
      <button class="goal" onclick="addScore('A','goal')">Goal</button> 
      <button class="point" onclick="addScore('A','point')">Point</button> 
      <button class="wide" onclick="addScore('A','wide')">Wide</button> 
      <button class="free" onclick="addScore('A','free')">Free</button> 
      <button class="fortyfive" onclick="addScore('A','45')">45</button> 
    </div> 
  </div> 

  <div class="team"> 
    <h3 id="teamBTitle">Team B</h3> 
    <div class="buttons"> 
      <button class="goal" onclick="addScore('B','goal')">Goal</button> 
      <button class="point" onclick="addScore('B','point')">Point</button> 
      <button class="wide" onclick="addScore('B','wide')">Wide</button> 
      <button class="free" onclick="addScore('B','free')">Free</button> 
      <button class="fortyfive" onclick="addScore('B','45')">45</button> 
    </div> 
  </div> 

  <button class="undo" onclick="undo()">Undo</button> 
  <button class="reset" onclick="resetMatch()">Reset</button> 

  <div id="log"></div> 

</div> 

<script> 
  
let score = { 
  A:{goals:0,points:0}, 
  B:{goals:0,points:0} 
};
  
let history = []; 

let seconds = 0; 
let interval = null; 
let half = 1; 

// TIMER 
function startTimer() { 
  if (!interval) { 
    interval = setInterval(() => { 
      seconds++; 
      updateTimer(); 
    }, 1000); 
  } 
} 

function pauseTimer() { 
  clearInterval(interval); 
  interval = null; 
} 

function resetTimer() { 
  pauseTimer(); 
  seconds = 0; 
  updateTimer(); 
} 

function updateTimer() { 
  let m = String(Math.floor(seconds/60)).padStart(2,'0'); 
  let s = String(seconds%60).padStart(2,'0'); 
  document.getElementById("timer").innerText = `${m}:${s}`; 
} 

// SCORE 
function addScore(team, type) { 
  history.push(JSON.parse(JSON.stringify(score))); 

  if (type === 'goal') score[team].goals++; 
  if (type === 'point') score[team].points++; 

  updateDisplay(); 
  logEvent(`${team === 'A' ? 'Tullylish' : getTeamB()} ${type} | HT:${half}`); 
} 

// Format Score
function formatScore(t) { 
  let total = t.goals * 3 + t.points; 
  return `${t.goals}-${t.points} (${total})`; 
} 

  
// DISPLAY 
function updateDisplay() {
  let aTotal = score.A.goals * 3 + score.A.points;
  let bTotal = score.B.goals * 3 + score.B.points;

  document.getElementById("scoreA").innerText =
    `${score.A.goals}-${score.A.points} (${aTotal})`;

  document.getElementById("scoreB").innerText =
    `${score.B.goals}-${score.B.points} (${bTotal})`;

  document.getElementById("teamBNameDisplay").innerText =
    getTeamB();

  document.getElementById("halfDisplay").innerText =
  half === 1 ? "1H" : "2H";
  
}

// Toggle Half
function toggleHalf() { 
  if (half === 1) { 
    // save half-time score snapshot 
    halfScores = JSON.parse(JSON.stringify(score)); 

    logEvent(`HALF TIME: Tullylish ${formatScore(score.A)} - ${formatScore(score.B)} Team B`); 
    half = 2; 

  } else { 
    logEvent(`FULL TIME: Tullylish ${formatScore(score.A)} - ${formatScore(score.B)} Team B`); 
    half = 1; 
  } 

  const display = document.getElementById("halfDisplay"); 
  if (display) display.innerText = half === 1 ? "1H" : "2H"; 
} 

  

function getTeamB() { 
  return document.getElementById("teamBName").value || "Team B"; 
} 

// UNDO 
function undo() { 
  if (history.length > 0) { 
    score = history.pop(); 
    updateDisplay(); 
  } 
} 

// LOG 
function logEvent(text) { 
  const log = document.getElementById("log"); 
  if (!log) return; 

  let time = document.getElementById("timer").innerText; 
  let period = half === 1 ? "1H" : "2H"; 

  const entry = document.createElement("div"); 
  entry.textContent = `[${time} ${period}] ${text}`; 

  log.prepend(entry); 
} 


// RESET MATCH 
function resetMatch() { 
  // reset scores 
  score = { A: { goals: 0, points: 0 }, B: { goals: 0, points: 0 } }; 
  history = []; 

  // reset timer + half 
  seconds = 0; 
  half = 1; 

  // clear log 
  const log = document.getElementById("log"); 
  if (log) log.innerHTML = ""; 

  // reset UI displays 
  updateDisplay(); 
  updateTimer(); 

  const halfDisplay = document.getElementById("halfDisplay"); 
  if (halfDisplay) halfDisplay.innerText = "1H"; 

  const teamBDisplay = document.getElementById("teamBNameDisplay"); 
  if (teamBDisplay) teamBDisplay.innerText = getTeamB(); 

  // optional: confirm reset in log 
  logEvent("APP RESET - NEW MATCH READY"); 
} 


updateDisplay(); 
updateTimer(); 

</script> 

</body> 
</html>
